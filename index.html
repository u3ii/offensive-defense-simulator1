

<script>
        // الرسم البياني الخطي
        document.addEventListener('DOMContentLoaded', function() {
            const weeks = ['Week 1', 'Week 2', 'Week 3', 'Week 4'];
            
            const trace1 = {
                x: weeks,
                y: [3, 5, 8, 12],
                name: 'Critical',
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: '#ff0000', width: 3 },
                marker: { size: 8 }
            };
            
            const trace2 = {
                x: weeks,
                y: [7, 9, 11, 15],
                name: 'High',
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: '#FFA500', width: 3 },
                marker: { size: 8 }
            };
            
            const trace3 = {
                x: weeks,
                y: [12, 14, 13, 18],
                name: 'Medium',
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: '#888', width: 3 },
                marker: { size: 8 }
            };

            const layout = {
                title: { text: 'Vulnerability Trends', font: { color: 'white' } },
                plot_bgcolor: 'black',
                paper_bgcolor: 'black',
                font: { color: 'white', size: 10 },
                xaxis: { gridcolor: '#333', tickfont: { color: 'white' } },
                yaxis: { gridcolor: '#333', tickfont: { color: 'white' }, range: [0, 25] },
                showlegend: true,
                legend: { font: { color: 'white' }, orientation: 'h', y: -0.2 }
            };

            Plotly.newPlot('chart', [trace1, trace2, trace3], layout, {responsive: true});
        });

        // البيانات
        const scenarios = {
            beginner: { target: { ip: "192.168.1.100", os: "Ubuntu 20.04", services: [{name:"SSH",risk:"high"},{name:"HTTP"},{name:"HTTPS"}] }},
            intermediate: { target: { ip: "192.168.1.150", os: "Windows 2022", services: [{name:"RDP",risk:"critical"},{name:"SMB",risk:"critical"},{name:"IIS"}] }},
            advanced: { targets: [{name:"Web",services:[{name:"SSH",risk:"high"}]},{name:"DB",services:[{name:"MySQL"}]}] }
        };

        // عناصر
        const scenarioSelect = document.getElementById('scenarioSelect');
        const scenarioDetails = document.getElementById('scenarioDetails');
        const startBtn = document.getElementById('startBtn');
        const exportBtn = document.getElementById('exportBtn');
        const resultsSection = document.getElementById('results');

        // تحديث التفاصيل
        function updateScenarioDetails() {
            const s = scenarios[scenarioSelect.value];
            if(s.targets) {
                scenarioDetails.innerHTML = `<p><span>Network:</span> ${s.targets.length} targets</p>`;
            } else {
                scenarioDetails.innerHTML = `
                    <p><span>Target:</span> ${s.target.ip}</p>
                    <p><span>OS:</span> ${s.target.os}</p>
                    <p><span>Services:</span> ${s.target.services.length}</p>
                `;
            }
        }

        // تشغيل المحاكاة وعرض النتائج
        function runSimulation() {
            // إظهار قسم النتائج
            resultsSection.style.display = 'block';
            
            // عرض النتائج بشكل منسق
            resultsSection.innerHTML = `
                <h2 style="color: #FF0000; border-bottom: 2px solid #FF0000; padding-bottom: 5px; margin-bottom: 20px;">⚔️ SIMULATION RESULTS</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="glass-card">
                        <h3 style="color:#FF0000; margin-bottom: 15px;">📊 Vulnerability Summary</h3>
                        <p><span style="color:#ff0000;">🔴 Critical:</span> 3</p>
                        <p><span style="color:#FFA500;">🟡 High:</span> 5</p>
                        <p><span style="color:#888;">⚪ Medium:</span> 12</p>
                        <p style="margin-top: 10px; color: #4CAF50;">Total Vulnerabilities: 20</p>
                    </div>
                    <div class="glass-card">
                        <h3 style="color:#FF0000; margin-bottom: 15px;">🔧 Recommendations</h3>
                        <ul style="list-style: none; padding: 0;">
                            <li style="margin: 10px 0; padding: 8px; background: rgba(255,0,0,0.1); border-left: 4px solid #ff0000;">
                                <span style="color:#ff0000;">🔴</span> Patch OpenSSH immediately
                            </li>
                            <li style="margin: 10px 0; padding: 8px; background: rgba(255,165,0,0.1); border-left: 4px solid #FFA500;">
                                <span style="color:#FFA500;">🟡</span> Update Apache to latest version
                            </li>
                            <li style="margin: 10px 0; padding: 8px; background: rgba(255,165,0,0.1); border-left: 4px solid #FFA500;">
                                <span style="color:#FFA500;">🟡</span> Close port 445 (SMB)
                            </li>
                        </ul>
                    </div>
                </div>
            `;
        }

        // فتح التبويبات
        window.openTab = function(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        };

        // أحداث
        scenarioSelect.addEventListener('change', updateScenarioDetails);
        startBtn.addEventListener('click', runSimulation);
        exportBtn.addEventListener('click', () => alert('Report generation coming soon'));

        // بداية
        updateScenarioDetails();

        // تأثير اللمس لجميع المربعات
        document.querySelectorAll('.glass-card, button, select, .tab, .scenario-detail').forEach(el => {
            el.addEventListener('touchstart', function(e) {
                this.classList.add('touch-highlight');
            });
            el.addEventListener('touchend', function(e) {
                this.classList.remove('touch-highlight');
            });
            el.addEventListener('touchmove', function(e) {
                const rect = this.getBoundingClientRect();
                const touch = e.touches[0];
                if (touch.clientX < rect.left || touch.clientX > rect.right ||
                    touch.clientY < rect.top || touch.clientY > rect.bottom) {
                    this.classList.remove('touch-highlight');
                }
            });
            el.addEventListener('touchcancel', function(e) {
                this.classList.remove('touch-highlight');
            });
        });
    </script>
</body>
</html>
